<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ozone High School Record Management</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body class="site-body">
    <!-- 1. PERSISTENT HEADER (Same on every page) -->
    <header class="site-header">
        <h1 class="logo">Ozone High School</h1>
        <nav class="main-nav">
            <a href="Home.html">Home</a>
            <a href="About.html">About us</a>

            <!-- 2. THE NEW DROPDOWN MENU FOR ADMISSIONS -->
            <div class="dropdown">
                <a href="Admissions.html" class="dropbtn">Admissions</a>
                <div class="dropdown-content">
                    <!-- Add more links here if needed! -->
                    <a href="Admissions.html#process">Apply Now</a>
                    <a href="Admissions.html#requirements">Requirements</a>
                    <a href="Admissions.html#dates">Important Dates</a>
                </div>
            </div>

            <a href="Academic.html">Academic</a>
            <a href="Staff.html">Staff</a>
            <a href="contact.html">Contact Us</a>
            <a href="index.html">Login</a>
        </nav>
    </header>

    <!-- 3. MAIN CONTENT (The Login/Signup Box) -->
    <main>
        <section id="auth-section">
            <div class="auth-box">
                <div class="form-toggle">
                    <button id="show-login" class="active">Login</button>
                    <button id="show-signup">Sign Up</button>
                </div>

                <!-- login form -->
                <form id="login-form" class="auth-form">
                    <h2>Login to Record Management</h2>
                    <label for="username">Username:</label>
                    <input type="text" id="username" placeholder="Enter username" required /><br><br>
                    <label for="password">Password:</label>
                    <input type="password" id="password" placeholder="Enter password" required /><br><br>
                    <label>Role:</label>
                    <select id="role" required>
                        <option value="Select">Select Role</option>
                        <option value="Admin">Admin</option>
                        <option value="Teacher">Teacher</option>
                        <option value="Parent">Parent</option>
                        <option value="Student">Student</option>
                    </select><br><br>
                    <button type="submit">Login</button>
                </form>

                <!-- signup form -->
                <form id="signup-form" class="auth-form hidden">
                    <h2>Create an Account</h2>
                    <label for="new-username">Username:</label>
                    <input type="text" id="new-username" placeholder="Enter username" required /><br><br>
                    <label for="new-email">Email:</label>
                    <input type="email" id="new-email" placeholder="Enter email" required /><br><br>
                    <label for="new-password">Password:</label>
                    <input type="password" id="new-password" placeholder="Enter password" required /><br><br>
                    <label for="confirm-password">Confirm Password:</label>
                    <input type="password" id="confirm-password" placeholder="Confirm password" required /><br><br>
                    <label>Role:</label>
                    <select id="new-role" required>
                        <option value="Select">Select Role</option>
                        <option value="Admin">Admin</option>
                        <option value="Teacher">Teacher</option>
                        <option value="Parent">Parent</option>
                        <option value="Student">Student</option>
                    </select><br><br>
                    <button type="submit">Sign Up</button>
                </form>
            </div>
        </section>
    </main>

    <!-- 4. THE PERSISTENT FOOTER (Same on every page) -->
    <footer class="site-footer">
        <small>© Ozone High School || Record Management</small>
    </footer>

    <script>
        // This script handles the Login/Signup toggle
        const loginForm = document.getElementById('login-form');
        const signupForm = document.getElementById('signup-form');
        const showLogin = document.getElementById('show-login');
        const showSignup = document.getElementById('show-signup');

        showLogin.addEventListener('click', () => {
            loginForm.classList.remove('hidden');
            signupForm.classList.add('hidden');
            showLogin.classList.add('active');
            showSignup.classList.remove('active');
        });

        showSignup.addEventListener('click', () => {
            loginForm.classList.add('hidden');
            signupForm.classList.remove('hidden');
            showSignup.classList.add('active');
            showLogin.classList.remove('active');
        });
    </script>
</body>

</html>
